<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wing Chun Daily Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; padding: 1.5rem; min-height: 100vh; }
  .container { max-width: 640px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .top-bar h1 { font-size: 18px; font-weight: 500; color: #1a1a18; }
  .date-badge { font-size: 12px; color: #888780; }
  .shuffle-btn { font-size: 13px; border: 0.5px solid #b4b2a9; border-radius: 8px; background: #fff; color: #5f5e5a; padding: 6px 14px; cursor: pointer; }
  .shuffle-btn:hover { background: #f1efe8; }
  .section-header { font-size: 12px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.08em; margin: 1.5rem 0 8px; padding-bottom: 6px; border-bottom: 0.5px solid #d3d1c7; }
  .q-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .q-number { font-size: 11px; color: #b4b2a9; font-weight: 500; margin-bottom: 4px; }
  .q-prompt { font-size: 16px; font-weight: 500; color: #1a1a18; margin-bottom: 10px; line-height: 1.45; }
  .reveal-btn { font-size: 13px; border: 0.5px solid #b4b2a9; border-radius: 8px; background: transparent; color: #5f5e5a; padding: 5px 14px; cursor: pointer; }
  .reveal-btn:hover { background: #f1efe8; }
  .answer-box { margin-top: 10px; padding: 10px 14px; border-radius: 8px; border-left: 3px solid #1d9e75; background: #f1efe8; }
  .answer-label { font-size: 11px; font-weight: 500; color: #0f6e56; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .answer-text { font-size: 15px; font-weight: 500; color: #1a1a18; margin-bottom: 2px; }
  .answer-chinese { font-size: 13px; color: #5f5e5a; }
  .score-row { display: flex; gap: 8px; margin-top: 10px; }
  .score-btn { font-size: 12px; border-radius: 8px; padding: 5px 12px; cursor: pointer; border: 0.5px solid #b4b2a9; background: transparent; color: #5f5e5a; }
  .score-btn.got-it { background: #e1f5ee; color: #0f6e56; border-color: #5dcaa5; }
  .score-btn.missed { background: #faece7; color: #993c1d; border-color: #f0997b; }
  .reveal-all-wrap { text-align: center; margin: 1.5rem 0 0.5rem; }
  .reveal-all-btn { font-size: 13px; border: 0.5px solid #b4b2a9; border-radius: 8px; background: #fff; color: #5f5e5a; padding: 7px 20px; cursor: pointer; }
  .reveal-all-btn:hover { background: #f1efe8; }
  .tally { font-size: 13px; color: #5f5e5a; text-align: center; margin-top: 1rem; min-height: 1.5rem; }
  .tally strong { color: #1a1a18; }
  .footer { font-size: 11px; color: #b4b2a9; text-align: center; margin-top: 2rem; padding-bottom: 1rem; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div>
      <h1>Wing Chun daily quiz</h1>
      <p class="date-badge" id="today-date"></p>
    </div>
    <button class="shuffle-btn" onclick="buildQuiz()">New draw ↺</button>
  </div>

  <div id="quiz-container"></div>

  <div class="reveal-all-wrap">
    <button class="reveal-all-btn" onclick="revealAll()">Reveal all answers</button>
  </div>
  <p class="tally" id="tally"></p>
  <p class="footer">5 long form · 5 other techniques · shuffled daily</p>
</div>

<script>
const longForm = [
  { term: "Man Sau", chinese: "問手", desc: "Inquisitive arm — forms the ready state with Wu Sau; used to gain contact, block or deflect." },
  { term: "Man Geng Sau", chinese: "問勁手", desc: "Neck pulling hand." },
  { term: "Kau Sau", chinese: "扣手", desc: "Scooping hand." },
  { term: "Kwan Sau", chinese: "綑手", desc: "Rotating arms." },
  { term: "Lap Sau", chinese: "拉手", desc: "Deflective/pulling arm — destroys opponent's balance with a short sharp pull, typically paired with a simultaneous strike." },
  { term: "Lan Sau", chinese: "拦手", desc: "Bar arm — lifting block/bridging technique with forearm level with the shoulders." },
  { term: "Huen Sau", chinese: "圈手", desc: "Circling/rotating hand — changes position while controlling the attacker's arm; removes obstacles to striking." },
  { term: "Jeung Sau", chinese: "掌手", desc: "Changing arms." },
  { term: "Jing Jeung", chinese: "正掌", desc: "Vertical palm strike." },
  { term: "Dai Bong Sau", chinese: "低膀手", desc: "Low wing arm — Bong Sau applied lower to cover the mid/low-gate." },
  { term: "Dai Jeung", chinese: "底掌", desc: "Low palm strike — follows Taan Sau and Huen Sau in section 3; strikes the lower ribs." },
  { term: "Dai Kuen", chinese: "底拳", desc: "Low punch — used in the Wooden Dummy form; straight punch to the trunk of the dummy." },
  { term: "Fak Sau", chinese: "拂手", desc: "Whisking arm — chop technique usable as block or strike, especially against opponents to the side." },
  { term: "Fook Sau", chinese: "伏手", desc: "Controlling/bridge-on hand — bridges on opponent's arm; used extensively in Chi Sau as deflection or limb control." },
  { term: "Gaan Sau", chinese: "耕手", desc: "Low block/splitting arm — blocks attacks to the mid section." },
  { term: "Gum Sau", chinese: "撳手", desc: "Pinning hand — blocks or pins opponent's arm; often used in Chi Sao." },
  { term: "Biu Sau", chinese: "镖手", desc: "Thrusting hand — deflects attacks at shoulder height or above; can strike eyes and throat." },
  { term: "Bong Sau", chinese: "膀手", desc: "Wing arm — deflective technique deployed when other techniques are compromised by a punch crossing the centreline." },
];

const other = [
  { cat: "Hand technique", term: "Wu Sao", desc: "Protective hand" },
  { cat: "Hand technique", term: "Tan Sao", desc: "Spread hand" },
  { cat: "Hand technique", term: "Pak Sao", desc: "Slapping palm" },
  { cat: "Hand technique", term: "Lop Sao", desc: "Grab" },
  { cat: "Hand technique", term: "Bong Sao", desc: "Crane wing deflection" },
  { cat: "Hand technique", term: "Fuk Sao", desc: "Hooking hand" },
  { cat: "Hand technique", term: "Jut Sau", desc: "Jerking hand" },
  { cat: "Hand technique", term: "Kuen Sao", desc: "Fist / punch" },
  { cat: "Hand technique", term: "Jip Sao", desc: "Folding hand" },
  { cat: "Hand technique", term: "Tai Sao", desc: "Rising hands" },
  { cat: "Hand technique", term: "Jung Sao", desc: "Downward chop" },
  { cat: "Hand technique", term: "Man Sao", desc: "Seeking hand / ask the way" },
  { cat: "Hand technique", term: "Gum Sao", desc: "Pinning / pressing hand" },
  { cat: "Hand technique", term: "Huen Sao", desc: "Small circle block" },
  { cat: "Hand technique", term: "Lau Sao", desc: "Large circle hand" },
  { cat: "Hand technique", term: "Lan Sao", desc: "Bannister arm" },
  { cat: "Hand technique", term: "Gaun Sao", desc: "Plowing hand / downward block" },
  { cat: "Hand technique", term: "Tok Sao", desc: "Pulling hands" },
  { cat: "Hand technique", term: "Bil Jee Sao", desc: "Thrusting fingers" },
  { cat: "Hand technique", term: "Lin Wan Kuen", desc: "Circle punches" },
  { cat: "Hand technique", term: "Yut Fook Yee", desc: "One hand trapping two" },
  { cat: "Elbow technique", term: "Pai Jahng", desc: "Hacking elbow" },
  { cat: "Elbow technique", term: "Dai Jahng", desc: "Downward elbow" },
  { cat: "Elbow technique", term: "Gum Jahng", desc: "Pressing elbow" },
  { cat: "Elbow technique", term: "Sao Jahng", desc: "Retracting waist elbow strike" },
  { cat: "Stance", term: "Yee Jee Ku Yeung Ma", desc: "Goat restraining stance" },
  { cat: "Stance", term: "Sei Ping Ma", desc: "Horse stance" },
  { cat: "Stance", term: "Dui Ma", desc: "Cat stance" },
  { cat: "Stance", term: "Chun Ma", desc: "Triangle / back stance (60-40)" },
];

let scores = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr, n) { return shuffle(arr).slice(0, n); }

function buildQuiz() {
  scores = {};
  document.getElementById('tally').textContent = '';
  const lf = pick(longForm, 5);
  const ot = pick(other, 5);
  const container = document.getElementById('quiz-container');
  let html = '<p class="section-header">Long form — name the technique</p>';

  lf.forEach((q, i) => {
    const id = 'lf' + i;
    html += cardHTML(id, 'Long form ' + (i+1) + ' of 5', q.desc, q.term, q.chinese);
  });

  html += '<p class="section-header">Other techniques — name the technique</p>';
  ot.forEach((q, i) => {
    const id = 'ot' + i;
    html += cardHTML(id, q.cat + ' — ' + (i+1) + ' of 5', q.desc, q.term, null);
  });

  container.innerHTML = html;
}

function cardHTML(id, label, prompt, answer, chinese) {
  const chineseHTML = chinese ? '<p class="answer-chinese">' + chinese + '</p>' : '';
  return `<div class="q-card">
    <p class="q-number">${label}</p>
    <p class="q-prompt">${prompt}</p>
    <button class="reveal-btn" id="btn-${id}" onclick="reveal('${id}')">Reveal answer</button>
    <div id="${id}" style="display:none">
      <div class="answer-box">
        <p class="answer-label">answer</p>
        <p class="answer-text">${answer}</p>
        ${chineseHTML}
      </div>
      <div class="score-row">
        <button class="score-btn" id="${id}-got" onclick="markScore('${id}','got')">✓ Got it</button>
        <button class="score-btn" id="${id}-miss" onclick="markScore('${id}','miss')">✗ Missed</button>
      </div>
    </div>
  </div>`;
}

function reveal(id) {
  document.getElementById(id).style.display = 'block';
  const btn = document.getElementById('btn-' + id);
  if (btn) btn.style.display = 'none';
}

function revealAll() {
  document.querySelectorAll('.reveal-btn').forEach(btn => { btn.style.display = 'none'; });
  document.querySelectorAll('.q-card > div[id]').forEach(el => { el.style.display = 'block'; });
}

function markScore(id, result) {
  scores[id] = result;
  const got = document.getElementById(id + '-got');
  const miss = document.getElementById(id + '-miss');
  got.className = 'score-btn' + (result === 'got' ? ' got-it' : '');
  miss.className = 'score-btn' + (result === 'miss' ? ' missed' : '');
  updateTally();
}

function updateTally() {
  const vals = Object.values(scores);
  if (!vals.length) return;
  const got = vals.filter(v => v === 'got').length;
  document.getElementById('tally').innerHTML = 'Score so far: <strong>' + got + ' / ' + vals.length + '</strong> marked';
}

const now = new Date();
document.getElementById('today-date').textContent = now.toLocaleDateString('en-GB', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

buildQuiz();
</script>
</body>
</html>
