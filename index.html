<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wing Chun Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;padding:1.5rem;color:#1a1a18}
.wrap{max-width:620px;margin:0 auto}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:12px}
h1{font-size:18px;font-weight:500}
.sub{font-size:12px;color:#888780;margin-top:2px}
.topbtns{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.newbtn{font-size:13px;border:1px solid #b4b2a9;border-radius:8px;background:#fff;color:#5f5e5a;padding:6px 14px;cursor:pointer}
.newbtn:hover{background:#e8e6e0}
.levelbtns{display:flex;gap:6px}
.lvlbtn{font-size:12px;border:1px solid #b4b2a9;border-radius:8px;background:#fff;color:#5f5e5a;padding:5px 12px;cursor:pointer}
.lvlbtn:hover{background:#e8e6e0}
.lvlbtn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.sechead{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid #d3d1c7}
.badge{display:inline-block;font-size:11px;font-weight:600;color:#fff;border-radius:6px;padding:2px 8px;margin-bottom:12px}
.badge-l1{background:#3b6d11}.badge-l2{background:#185fa5}
.qcard{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:16px 20px;margin-bottom:10px}
.qnum{font-size:11px;color:#b4b2a9;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.qprompt{font-size:16px;font-weight:500;line-height:1.45;margin-bottom:12px}
.btnrow{display:flex;gap:8px}
.revbtn,.hintbtn{font-size:13px;border:1px solid #b4b2a9;border-radius:8px;background:transparent;color:#5f5e5a;padding:6px 14px;cursor:pointer}
.revbtn:hover,.hintbtn:hover{background:#f1efe8}
.hintbox{display:none;margin-top:12px}
.hintlabel{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.optrow{display:flex;flex-direction:column;gap:6px}
.optbtn{font-size:14px;border:1px solid #b4b2a9;border-radius:8px;background:#fff;color:#1a1a18;padding:8px 14px;cursor:pointer;text-align:left;width:100%}
.optbtn:hover:not([disabled]){background:#f1efe8}
.opt-correct{background:#e1f5ee;border-color:#5dcaa5;color:#0f6e56;font-weight:600}
.opt-wrong{background:#faece7;border-color:#f0997b;color:#993c1d;text-decoration:line-through}
.scorerow{display:none;gap:8px;margin-top:10px}
.gotbtn,.missbtn{font-size:12px;border-radius:8px;padding:5px 12px;cursor:pointer;border:1px solid #b4b2a9;background:transparent;color:#5f5e5a}
.gotbtn.active{background:#e1f5ee;color:#0f6e56;border-color:#5dcaa5;font-weight:600}
.missbtn.active{background:#faece7;color:#993c1d;border-color:#f0997b;font-weight:600}
.tally{font-size:14px;color:#5f5e5a;text-align:center;margin-top:1.25rem;min-height:1.4rem}
.tally strong{color:#1a1a18;font-size:16px}
.footer{font-size:11px;color:#b4b2a9;text-align:center;margin-top:1.5rem;padding-bottom:2rem}
.resetbtn{font-size:11px;color:#b4b2a9;background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:6px;display:block;margin-left:auto;margin-right:auto}
.resetbtn:hover{color:#5f5e5a}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Wing Chun quiz</h1>
      <p class="sub" id="subdesc">10 techniques — hint/select or reveal answer</p>
    </div>
    <div class="topbtns">
      <button class="newbtn" id="newbtn">New draw ↺</button>
      <div class="levelbtns">
        <button class="lvlbtn active" id="btn-l1">Level 1</button>
        <button class="lvlbtn" id="btn-l2">Level 2</button>
      </div>
    </div>
  </div>
  <div id="quiz"></div>
  <p class="tally" id="tally"></p>
  <p class="footer">Wing Chun daily quiz</p>
  <button class="resetbtn" id="resetbtn">Reset progress</button>
</div>

<script>
var LF   = [["Man Sau", "\u554f\u624b", "Inquisitive arm \u2014 forms the ready state with Wu Sau; used to gain contact, block or deflect."], ["Man Geng Sau", "\u554f\u52c1\u624b", "Neck pulling hand."], ["Kau Sau", "\u6263\u624b", "Scooping hand."], ["Kwan Sau", "\u7d91\u624b", "Rotating arms."], ["Lap Sau", "\u62c9\u624b", "Deflective/pulling arm \u2014 destroys opponent's balance with a short sharp pull, typically paired with a simultaneous strike."], ["Lan Sau", "\u62e6\u624b", "Bar arm \u2014 lifting block/bridging technique with forearm level with the shoulders."], ["Huen Sau", "\u5708\u624b", "Circling/rotating hand \u2014 changes position while controlling the attacker's arm; removes obstacles to striking."], ["Jeung Sau", "\u638c\u624b", "Changing arms."], ["Jing Jeung", "\u6b63\u638c", "Vertical palm strike."], ["Dai Bong Sau", "\u4f4e\u8180\u624b", "Low wing arm \u2014 Bong Sau applied lower to cover the mid/low-gate."], ["Dai Jeung", "\u5e95\u638c", "Low palm strike \u2014 follows Taan Sau and Huen Sau in section 3; strikes the lower ribs."], ["Dai Kuen", "\u5e95\u62f3", "Low punch \u2014 used in the Wooden Dummy form; straight punch to the trunk of the dummy."], ["Fak Sau", "\u62c2\u624b", "Whisking arm \u2014 chop technique usable as block or strike, especially against opponents to the side."], ["Fook Sau", "\u4f0f\u624b", "Controlling/bridge-on hand \u2014 bridges on opponent's arm; used extensively in Chi Sau as deflection or limb control."], ["Gaan Sau", "\u8015\u624b", "Low block/splitting arm \u2014 blocks attacks to the mid section."], ["Gum Sau", "\u64b3\u624b", "Pinning hand \u2014 blocks or pins opponent's arm; often used in Chi Sao."], ["Biu Sau", "\u9556\u624b", "Thrusting hand \u2014 deflects attacks at shoulder height or above; can strike eyes and throat."], ["Bong Sau", "\u8180\u624b", "Wing arm \u2014 deflective technique deployed when other techniques are compromised by a punch crossing the centreline."]];
var OL1  = [["Wu Sao", "Protective hand"], ["Tan Sao", "Spread hand"], ["Pak Sao", "Slapping palm"], ["Lop Sao", "Grab"], ["Bong Sao", "Crane wing deflection"], ["Fuk Sao", "Hooking hand"], ["Jut Sau", "Jerking hand"], ["Kuen Sao", "Fist / punch"], ["Jip Sao", "Folding hand"], ["Tai Sao", "Rising hands"], ["Jung Sao", "Downward chop"], ["Man Sao", "Seeking hand / ask the way"], ["Gum Sao", "Pinning / pressing hand"], ["Huen Sao", "Small circle block"], ["Lau Sao", "Large circle hand"], ["Lan Sao", "Bannister arm"], ["Gaun Sao", "Plowing hand / downward block"], ["Tok Sao", "Pulling hands"], ["Bil Jee Sao", "Thrusting fingers"], ["Lin Wan Kuen", "Circle punches"], ["Yut Fook Yee", "One hand trapping two"], ["Pai Jahng", "Hacking elbow"], ["Dai Jahng", "Downward elbow"], ["Gum Jahng", "Pressing elbow"], ["Sao Jahng", "Retracting waist elbow strike"], ["Yee Jee Ku Yeung Ma", "Goat restraining stance"], ["Sei Ping Ma", "Horse stance"], ["Dui Ma", "Cat stance"], ["Chun Ma", "Triangle / back stance (60-40)"]];
var OL2X = [["Chung Choi", "Vertical fist"], ["Ping Choi", "Horizontal fist"], ["Lau Gerk", "Kick defense"], ["Tai Kuen", "Raising punch"], ["Jut Dat", "Jerking hand with strike"], ["Wan Jeung", "Side palm strike"], ["Fox Sao", "Knife palm (aka Sut Sao)"], ["Gup Choi", "Upper cut"], ["Kwok Sao", "Snapping wrist to a fist"], ["Kwan Sao", "Double wiper hands \u2014 Tan and Gaun deflection"], ["Jung Choi", "Vertical punch"], ["Sub Ji Sao", "Double cross low hands"], ["Jit Jung Choi", "Three straight punches"], ["Faat Sao", "Swinging arm"], ["Sao Kuen", "Retract fist to waist"], ["Pak Da", "Slapping palm with strike"], ["Tan Da", "Spreading hand with strike"], ["Feng An Kuen", "Phoenix eye fist"], ["Jak Jeung", "Splitting palm strike"], ["Saam Bai Tze", "Triple waving snake hands"], ["Noi Kwan Sao", "Inside out / rolling hands outward"], ["Dai Chang Sao", "Fingers facing down palm"], ["Po Pai Jeung", "Double opposite palm strike"], ["Dai Bong", "Low sinking bridge"], ["Wan Jahng", "Wide angle elbow"], ["Hei Jahng", "Upward elbow strike"], ["Sung Jahng", "Retracting overhead elbow"], ["Yo Ma / Zo Ma", "Turning left or right in stance"], ["Duk Lak Ma", "Independent / single leg stance"], ["Sineng Ma", "Advancing step \u2014 same side"], ["Bil Ma", "Advance forward with back leg"], ["Toi Ma", "Retreat step back"], ["Huen Ma", "Circle step"], ["Chai Gerk", "Scraping kick"], ["Chang Gerk", "Low thrust kick"], ["Jing Gerk", "Front kick"], ["Huen Jing Gerk", "Circle front kick"], ["Jee Gwon Dik", "Side kick"], ["Kau Gerk", "Circling leg \u2014 stepping behind the opponent's leg"], ["Deng Gerk", "Nailing kick / toe kick"], ["Chi Gerk", "Sticky leg / foot"], ["Jit Gerk", "Jerking kick"], ["Tie Sut", "Lifting knee"], ["Soo Gerk", "Sweeping kick"], ["Lin Wan Gerk", "Chain kicks"], ["Wang Tan Gerk", "Round kick"], ["Sifu", "Master / teacher"], ["Sigung", "Grandmaster / senior master"], ["Sibak", "Senior teacher / instructor"], ["Sihing", "Senior classmate"], ["Si Dai", "Younger classmate"], ["Simo", "Female teacher / wife of Sifu"], ["SiSuk", "Junior instructor \u2014 Sifu's classmate"], ["Si Ti Gung", "Great grandmaster"], ["Gung Fu", "Developing advanced skills through hard work"], ["Kwoon", "Kung Fu school where training takes place"], ["Mo Duk", "Martial morality \u2014 virtue, honour, courage, respect and discipline"], ["Wing Chun", "Roughly translated as 'Forever Springtime'"], ["Sil Lum Tao", "Little idea \u2014 first form"], ["Chum Kiu", "Seeking the bridge \u2014 second form"], ["Biu Jee", "Thrusting fingers \u2014 third form"], ["Muk Jong", "Wooden dummy form"], ["Bat Jam Dao", "Eight slash knives"], ["Luk Dim Boon Gwun", "Six and a half point pole / staff"], ["Lan Da Chow Kuen", "Grab with striking bottom fist"], ["Moy Jut Sao", "Wiping hand with reverse chopping fox hand"], ["Chow Jueng", "Striking with downward palm and elbow"], ["Kuen Yao Sum Faat", "Punching from the centre of the chest"], ["Yau Pin Yap Sing", "Moving from side to centre"], ["Geon Ten Geh", "Skipping side kick"]];
var OL2  = OL1.concat(OL2X);

var currentLevel = 1;
var scores = {};
var STORAGE_KEY = 'wcProgress';

// ── Progress tracking ────────────────────────────────────────────────────────
// progress[term] = { streak: N, total: N }  (streak = consecutive correct)
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e) {}
}
function recordResult(term, got) {
  var p = loadProgress();
  if (!p[term]) p[term] = { streak: 0, total: 0 };
  p[term].total++;
  p[term].streak = got ? p[term].streak + 1 : 0;
  saveProgress(p);
}

// Weight: no history or just missed = 2, streak 1-2 = 1.5, streak 3-4 = 1, streak 5+ = 0.5
function getWeight(term) {
  var p = loadProgress();
  if (!p[term] || p[term].streak === 0) return 2;
  var s = p[term].streak;
  if (s >= 5) return 0.5;
  if (s >= 3) return 1;
  return 1.5;
}

// Weighted random sample without replacement
function weightedSample(arr, keyFn, n) {
  var pool = arr.map(function(x) { return { item: x, w: getWeight(keyFn(x)) }; });
  var result = [];
  for (var i = 0; i < n && pool.length > 0; i++) {
    var total = pool.reduce(function(s, x) { return s + x.w; }, 0);
    var r = Math.random() * total;
    var cum = 0;
    var idx = 0;
    for (var j = 0; j < pool.length; j++) {
      cum += pool[j].w;
      if (r <= cum) { idx = j; break; }
    }
    result.push(pool[idx].item);
    pool.splice(idx, 1);
  }
  return result;
}

// ── Quiz building ────────────────────────────────────────────────────────────
function rnd(arr, n) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a.slice(0,n);
}

function distractors(correct, pool, n) {
  var opts = pool.filter(function(x) { return x !== correct; });
  return rnd(opts, n);
}

function makeCard(uid, num, prompt, answer, termKey, pool) {
  var d = distractors(answer, pool, 2);
  var opts = d.concat([answer]);
  for (var i = opts.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = opts[i]; opts[i] = opts[j]; opts[j] = t;
  }
  var optHTML = '';
  opts.forEach(function(opt) {
    var cls = opt === answer ? 'correct' : 'wrong';
    optHTML += '<button class="optbtn ' + cls + '" data-uid="' + uid + '" data-term="' + termKey + '">' + opt + '</button>';
  });
  return '<div class="qcard" id="card' + uid + '">' +
    '<p class="qnum">Question ' + num + ' of 10</p>' +
    '<p class="qprompt">' + prompt + '</p>' +
    '<div class="btnrow" id="btnrow' + uid + '">' +
      '<button class="revbtn" data-uid="' + uid + '" data-term="' + termKey + '">Reveal answer</button>' +
      '<button class="hintbtn" data-uid="' + uid + '">Hint / select</button>' +
    '</div>' +
    '<div class="hintbox" id="hint' + uid + '">' +
      '<p class="hintlabel">Which is it?</p>' +
      '<div class="optrow" id="opts' + uid + '">' + optHTML + '</div>' +
    '</div>' +
    '<div class="scorerow" id="score' + uid + '">' +
      '<button class="gotbtn" data-uid="' + uid + '" data-term="' + termKey + '" data-result="got">&#10003; Got it</button>' +
      '<button class="missbtn" data-uid="' + uid + '" data-term="' + termKey + '" data-result="miss">&#10007; Missed</button>' +
    '</div>' +
  '</div>';
}

function buildQuiz() {
  scores = {};
  document.getElementById('tally').innerHTML = '';

  var lfPool   = LF.map(function(x) { return x[0]; });
  var otSrc    = currentLevel === 1 ? OL1 : OL2;
  var otPool   = otSrc.map(function(x) { return x[0]; });
  var lfDescPool = LF.map(function(x) { return x[2]; });
  var otDescPool = otSrc.map(function(x) { return x[1]; });

  var lfPick = weightedSample(LF, function(x) { return x[0]; }, 5);
  var otPick = weightedSample(otSrc, function(x) { return x[0]; }, 5);

  var reverseIdx = [1, 3, 6, 8];
  var badgeClass = currentLevel === 1 ? 'badge-l1' : 'badge-l2';
  var badgeText  = currentLevel === 1 ? 'Level 1' : 'Level 2';
  var html = '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
             '<p class="sechead">Wing Chun techniques — name each one</p>';

  lfPick.forEach(function(q, i) {
    var num = i + 1;
    if (reverseIdx.indexOf(num) !== -1) {
      html += makeCard('lf'+i, num, q[0], q[2], q[0], lfDescPool);
    } else {
      html += makeCard('lf'+i, num, q[2], q[0], q[0], lfPool);
    }
  });
  otPick.forEach(function(q, i) {
    var num = i + 6;
    if (reverseIdx.indexOf(num) !== -1) {
      html += makeCard('ot'+i, num, q[0], q[1], q[0], otDescPool);
    } else {
      html += makeCard('ot'+i, num, q[1], q[0], q[0], otPool);
    }
  });

  document.getElementById('quiz').innerHTML = html;
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll('.hintbtn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uid = this.getAttribute('data-uid');
      document.getElementById('btnrow'+uid).style.display = 'none';
      document.getElementById('hint'+uid).style.display = 'block';
    });
  });

  document.querySelectorAll('.revbtn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uid  = this.getAttribute('data-uid');
      var term = this.getAttribute('data-term');
      revealAnswer(uid, term);
    });
  });

  document.querySelectorAll('.optbtn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uid  = this.getAttribute('data-uid');
      var term = this.getAttribute('data-term');
      var allBtns = document.getElementById('opts'+uid).querySelectorAll('.optbtn');
      allBtns.forEach(function(b) { b.disabled = true; });
      var correct = this.classList.contains('correct');
      if (correct) {
        this.classList.add('opt-correct');
        autoScore(uid, term, 'got');
      } else {
        this.classList.add('opt-wrong');
        allBtns.forEach(function(b) { if (b.classList.contains('correct')) b.classList.add('opt-correct'); });
        autoScore(uid, term, 'miss');
      }
      allBtns.forEach(function(b) {
        if (b.classList.contains('wrong') && !b.classList.contains('opt-wrong')) b.style.display = 'none';
      });
      document.getElementById('score'+uid).style.display = 'flex';
    });
  });

  document.querySelectorAll('.gotbtn, .missbtn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var uid    = this.getAttribute('data-uid');
      var term   = this.getAttribute('data-term');
      var result = this.getAttribute('data-result');
      autoScore(uid, term, result);
    });
  });
}

function revealAnswer(uid, term) {
  document.getElementById('btnrow'+uid).style.display = 'none';
  document.getElementById('score'+uid).style.display = 'flex';
  var opts = document.getElementById('opts'+uid);
  if (opts) {
    opts.querySelectorAll('.wrong').forEach(function(b) { b.style.display = 'none'; });
    opts.querySelectorAll('.correct').forEach(function(b) { b.classList.add('opt-correct'); b.disabled = true; });
    document.getElementById('hint'+uid).style.display = 'block';
  }
}

function autoScore(uid, term, result) {
  if (!scores[uid]) {
    scores[uid] = result;
    recordResult(term, result === 'got');
  } else {
    scores[uid] = result;
  }
  var card = document.getElementById('card'+uid);
  card.querySelectorAll('.gotbtn').forEach(function(b) {
    b.className = 'gotbtn' + (result === 'got' ? ' active' : '');
  });
  card.querySelectorAll('.missbtn').forEach(function(b) {
    b.className = 'missbtn' + (result === 'miss' ? ' active' : '');
  });
  updateTally();
}

function updateTally() {
  var vals = Object.values(scores);
  if (!vals.length) return;
  var got = vals.filter(function(v) { return v === 'got'; }).length;
  var msg = 'Score: <strong>' + got + ' / ' + vals.length + '</strong>';
  if (vals.length === 10) {
    msg += ' &nbsp;&mdash;&nbsp; ' + (got === 10 ? 'Perfect!' : got >= 8 ? 'Great work.' : got >= 6 ? 'Good effort.' : 'Keep practising.');
  }
  document.getElementById('tally').innerHTML = msg;
}

function setLevel(n) {
  currentLevel = n;
  document.getElementById('btn-l1').className = 'lvlbtn' + (n === 1 ? ' active' : '');
  document.getElementById('btn-l2').className = 'lvlbtn' + (n === 2 ? ' active' : '');
  document.getElementById('subdesc').textContent = n === 1
    ? '10 techniques — hint/select or reveal answer'
    : 'Level 2 — wider range of techniques';
  buildQuiz();
}

document.getElementById('newbtn').addEventListener('click', function() { buildQuiz(); });
document.getElementById('btn-l1').addEventListener('click', function() { setLevel(1); });
document.getElementById('btn-l2').addEventListener('click', function() { setLevel(2); });
document.getElementById('resetbtn').addEventListener('click', function() {
  if (confirm('Reset all progress? This will clear your weighting history.')) {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    buildQuiz();
  }
});

buildQuiz();
</script>
</body>
</html>
